<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Linux_kings – Szczegóły Produktu</title>
  <link rel="stylesheet" href="css/style.css">
</head>


<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">Linux_kings</a>
      <nav>
        <ul class="nav-list grouped">
          <li class="nav-group">
          </li>
          <li class="nav-group">
            <a href="team.html"></a>
          </li>
          <li class="divider">|</li>
          <li class="nav-group">
            <li class="dropdown">
              <a href="jerseys.html"></a>
              <ul class="dropdown-menu">
                <li><a href="jerseys.html?type=koszulka">Koszulki</a></li>
                <li><a href="jerseys.html?type=longsleeve">Longsleeve</a></li>
                <li><a href="jerseys.html?type=bluza">Bluzy</a></li>
                <li><a href="jerseys.html?type=spodenki">Spodenki</a></li>
                <li><a href="jerseys.html?type=akcesoria">Akcesoria</a></li>
              </ul>
            </li>
            <a href="koszyk.html" class="cart-link">
              <i class="fas fa-shopping-cart"></i>
              <span class="cart-badge" id="cartCount"></span>
            </a>
          </li>
            <li class="nav-group">
              <li class="divider">|</li>
              <a href="matches.html"></a>
            </li>
        </ul>
      </nav>
      
    </div>
    <nav class="mobile-nav">
      <button class="hamburger" aria-label="Otwórz menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="mobile-nav__list">
        <li><a href="team.html">Drużyna</a></li>
        <hr class="mobile-divider">
        <li><a href="jerseys.html">Sklep</a></li>
        <li><a href="koszyk.html">Koszyk</a></li>
        <hr class="mobile-divider">
        <li><a href="matches.html">Rozgrywki</a></li>
      </ul>
    </nav>
    
  </header>


  <nav class="breadcrumbs">
    <a href="index.html"><i class="icon-home"></i></a>
    <span class="separator">›</span>
    <a href="jerseys.html">Sklep</a>
    <span class="separator">›</span>
    <span class="current"></span>
  </nav>

  <main>
    <!-- WYDZIELONA SEKCJA – GŁÓWNE ZDJĘCIE + KRÓTKI OPIS -->
    <section class="product-detail-wrapper">
      <div class="thumbnails"></div>
      <div class="main-image"><img src="" alt=""></div>
      <div class="product-info">
        <h1></h1>
        <p class="pattern"></p>
        <p class="price"></p>
        <p class="short-desc"></p>
        <div id="product-variants" class="product-variants">
          <!-- JS wstawi tutaj select/przyciski rozmiarow -->
        </div>
      
        <!-- Przycisk dodaj do koszyka -->
        <div style="margin-top:12px">
          <button id="addToCartBtn" class="btn">Dodaj do koszyka</button>
          <span id="product-msg" style="margin-left:12px;color:#c00"></span>
        </div>
      </div>
        
      </div>
    </section>

    <!-- SEKCJA ROZBUDOWANEGO OPISU -->
    <section class="description-section">
      <h2>Opis produktu</h2>
      <p class="long-desc"></p>
    </section>

    <!-- NOWA SEKCJA MATERIAŁ -->
    <section class="material-section">
      <h2>Materiał</h2>
      <ul class="material-list"></ul>
    </section>

    <!-- SEKCJA TABELI ROZMIARÓW -->
    <section class="size-table-section">
      <h2>Tabela rozmiarów</h2>
      <table class="size-table">
        <thead><tr id="sizeTableHeader"></tr></thead>
        <tbody id="sizeTableBody"></tbody>
      </table>
      <p class="size-table-note" id="sizeTableNote"></p>
    </section>
    
    <button onclick="topFunction()" id="Btn" title="Go to top">^</button>
 
  </main>

   <script src="js/products.js"></script>

  <!-- 2) Cart API -->
  <script src="js/cart.js"></script>

  <!-- 3) Ogólny script (slider, kalendarz...) -->
  <script src="js/product-page.js"></script>
  <script src="js/compat.js"></script> 
  <script src="js/script.js"></script>
  <script src="js/menu.js"></script>

  <!-- 4) Inline: podłączenie Kup teraz → addToCart -->



<!-- BEGIN: cart-added-modal (podmień stary fragment) -->
<div id="cart-added-modal" class="cart-modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="cartModalTitle">
  <div class="modal-overlay" data-modal-close></div>

  <div class="modal-window" role="document">
    <button class="modal-close" aria-label="Zamknij" data-modal-close>✕</button>

    <header class="modal-header">
      <div class="modal-notice" id="cartModalTitle">Produkt dodany do koszyka!</div>
      <div class="added-info">
        <img class="added-img" src="" alt="" data-placeholder="banery/placeholder.jpg">
        <div class="added-meta">
          <div class="added-name" style="font-weight:700"></div>

        </div>
      </div>
    </header>

    <section class="modal-body">
      <div class="rec-head" style="font-weight:700;margin-bottom:8px">Polecane produkty</div>

      <div class="rec-wrap">
        <button class="rec-prev" aria-label="Poprzednie polecane">‹</button>
        <div class="rec-track" role="list" aria-live="polite"></div>
        <button class="rec-next" aria-label="Następne polecane">›</button>
      </div>
    </section>

    <footer class="modal-footer">
      <button class="btn ghost" data-modal-close>Kontynuuj zakupy</button>
      <a href="koszyk.html" class="btn primary">Pokaż koszyk</a>
    </footer>
  </div>
</div>
<!-- END: cart-added-modal -->

</body>
</html>
