<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <title>Admin — Dodaj produkty (lokalnie)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:Inter,Arial,Helvetica,sans-serif;max-width:980px;margin:18px auto;padding:0 12px;color:#222}
    h1{font-size:20px}
    label{display:block;margin:8px 0 4px;font-weight:600}
    input[type="text"], input[type="number"], textarea, select {width:100%;padding:8px;border:1px solid #ddd;border-radius:6px}
    textarea{min-height:80px}
    .row{display:flex;gap:8px}
    .row > *{flex:1}
    .controls{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
    button{padding:8px 12px;border-radius:6px;border:0;cursor:pointer;background:#0b74de;color:white}
    button.ghost{background:#eee;color:#333}
    .product{border:1px solid #eee;padding:10px;margin-top:10px;border-radius:6px;background:#fafafa}
    pre{white-space:pre-wrap;background:#fff;padding:8px;border-radius:6px;border:1px solid #f0f0f0}
    small{color:#666}
  </style>
</head>
<body>
  <h1>Admin (lokalnie) — Dodaj produkt</h1>

  <p><small>Uwaga: ten formularz działa lokalnie w przeglądarce. Po dodaniu produktów kliknij <strong>Export JSON</strong> i wrzuć wygenerowany plik <code>products.json</code> do repo (root strony) albo skopiuj fragment JS i wklej do <code>js/products.js</code>.</small></p>

  <label>Nazwa produktu<input id="name" type="text" placeholder="np. Koszulka XYZ"></label>
  <label>ID / slug (unikatowy)<input id="id" type="text" placeholder="np. koszulka-xyz"></label>
  <div class="row">
    <div>
      <label>Cena (np. 129.99)<input id="price" type="number" step="0.01" placeholder="129.99"></label>
    </div>
    <div>
      <label>Kategoria (type)<input id="type" type="text" placeholder="np. jersey"></label>
    </div>
  </div>

  <label>Rozmiary (CSV) <input id="sizes" type="text" placeholder="S,M,L,XL"></label>
  <label>Ścieżka do głównego obrazu (np. banery/str1.jpg lub https://... )<input id="mainImage" type="text" placeholder="banery/strona-41.jpg"></label>
  <label>Inne obrazy (CSV ścieżek lub URLi) <input id="images" type="text" placeholder="img1.jpg,img2.jpg"></label>

  <label>Krótki opis<textarea id="description"></textarea></label>
  <label>Tabela rozmiarów (tekst/CSV lub HTML)<textarea id="sizeTable" placeholder="np. S:90-95,M:96-100"></textarea></label>

  <div class="controls">
    <button id="add">Add product</button>
    <button id="export" class="ghost">Export JSON</button>
    <button id="copy" class="ghost">Kopiuj JSON</button>
    <button id="exportJS" class="ghost">Generuj snippet JS (window.PRODUCTS = ...)</button>
    <button id="clear" class="ghost">Wyczyść listę</button>
  </div>

  <h3>Lista (robocza)</h3>
  <div id="list"></div>

  <h3>Podgląd wygenerowanego JSON / JS</h3>
  <pre id="preview">[]</pre>

<script>
  (() => {
    const products = [];
    const el = {
      name: document.getElementById('name'),
      id: document.getElementById('id'),
      price: document.getElementById('price'),
      type: document.getElementById('type'),
      sizes: document.getElementById('sizes'),
      mainImage: document.getElementById('mainImage'),
      images: document.getElementById('images'),
      description: document.getElementById('description'),
      sizeTable: document.getElementById('sizeTable'),
      list: document.getElementById('list'),
      preview: document.getElementById('preview'),
      add: document.getElementById('add'),
      export: document.getElementById('export'),
      copy: document.getElementById('copy'),
      exportJS: document.getElementById('exportJS'),
      clear: document.getElementById('clear')
    };

    function renderList(){
      el.list.innerHTML = '';
      products.forEach((p, i) => {
        const d = document.createElement('div'); d.className = 'product';
        d.innerHTML = `<strong>${p.name}</strong> — ${p.price} PLN<br><small>${p.id} • ${p.type}</small>
          <pre>${JSON.stringify(p, null, 2)}</pre>
          <div style="text-align:right"><button data-i="${i}" class="remove ghost">Usuń</button></div>`;
        el.list.appendChild(d);
      });
      el.preview.textContent = JSON.stringify(products, null, 2);
      Array.from(document.querySelectorAll('.remove')).forEach(btn=>{
        btn.onclick = ()=>{ products.splice(+btn.dataset.i,1); renderList(); };
      });
    }

    function buildProduct() {
      const id = el.id.value.trim() || Date.now().toString();
      const name = el.name.value.trim();
      if(!name){ alert('Wpisz nazwę produktu'); return null; }
      const price = parseFloat(el.price.value) || 0;
      const type = el.type.value.trim() || 'general';
      const sizes = el.sizes.value.split(',').map(s=>s.trim()).filter(Boolean);
      const mainImage = el.mainImage.value.trim();
      const images = el.images.value.split(',').map(s=>s.trim()).filter(Boolean);
      const description = el.description.value.trim();
      const sizeTable = el.sizeTable.value.trim();

      return { id, name, price, type, sizes, mainImage, images, description, sizeTable };
    }

    el.add.addEventListener('click', ()=>{
      const p = buildProduct();
      if(!p) return;
      // prosty check na duplicate id
      if(products.some(x=>x.id === p.id)){ if(!confirm('Produkt o tym ID już istnieje. Dodać mimo to?')) return; }
      products.push(p);
      // opcjonalnie reset pól (tu zostawiamy id i name czyszczone)
      el.id.value = '';
      el.name.value = '';
      el.price.value = '';
      el.type.value = '';
      el.sizes.value = '';
      el.mainImage.value = '';
      el.images.value = '';
      el.description.value = '';
      el.sizeTable.value = '';
      renderList();
    });

    el.export.addEventListener('click', ()=>{
      const blob = new Blob([JSON.stringify(products, null, 2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'products.json'; document.body.appendChild(a);
      a.click(); a.remove(); URL.revokeObjectURL(url);
    });

    el.copy.addEventListener('click', async ()=>{
      try {
        await navigator.clipboard.writeText(JSON.stringify(products, null, 2));
        alert('JSON skopiowany do schowka');
      } catch(e){ alert('Kopiowanie nie powiodło się: ' + e); }
    });

    el.exportJS.addEventListener('click', ()=>{
      const snippet = 'window.PRODUCTS = ' + JSON.stringify(products, null, 2) + ';';
      // pokaż w preview (zamień)
      el.preview.textContent = snippet;
      // skopiuj snippet do schowka również
      navigator.clipboard?.writeText(snippet).then(()=>alert('JS-snippet skopiowany do schowka'), ()=>{});
    });

    el.clear.addEventListener('click', ()=>{
      if(!confirm('Wyczyścić listę produktów?')) return;
      products.length = 0; renderList();
    });

    // inicial
    renderList();
  })();
</script>
</body>
</html>
